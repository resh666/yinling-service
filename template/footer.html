<div id="paymentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>选择支付方式</h3>
            <span class="close" onclick="closePaymentModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="service-summary" id="modalServiceSummary"></div>
            <div class="payment-amount" id="modalAmount"></div>
            <div class="payment-methods">
                <button class="payment-btn wechat" onclick="selectPayment('wechat')">
                    <div class="payment-icon">&#xe677;</div>
                    <span>微信支付</span>
                </button>
                <button class="payment-btn alipay" onclick="selectPayment('alipay')">
                    <div class="payment-icon">&#xe679;</div>
                    <span>支付宝</span>
                </button>
            </div>
            <div class="payment-qrcode" id="paymentQRCode" style="display: none;">
                <div class="qrcode-placeholder" id="qrcodePlaceholder"></div>
                <p id="paymentInstructions"></p>
            </div>
            <div class="payment-actions" id="paymentActions" style="display: none;">
                <button class="btn btn-primary" onclick="confirmPayment()">确认支付</button>
                <button class="btn btn-secondary" onclick="closePaymentModal()">取消</button>
            </div>
        </div>
    </div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content modal-form">
        <div class="modal-header">
            <h3 id="bookingModalTitle">预约服务</h3>
            <span class="close" onclick="closeBookingModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="modalBookingForm">
                <input type="hidden" id="modalServiceType" name="serviceType">
                <input type="hidden" id="modalServicePrice" name="price">
                <div class="form-group">
                    <label>服务项目</label>
                    <input type="text" id="modalServiceName" readonly>
                </div>
                <div class="form-group">
                    <label>服务费用</label>
                    <input type="text" id="modalServicePriceDisplay" readonly>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="modalName"><span style="color: #e67e22;">*</span> 姓名</label>
                        <input type="text" id="modalName" name="name" required placeholder="请输入您的姓名">
                    </div>
                    <div class="form-group">
                        <label for="modalPhone"><span style="color: #e67e22;">*</span> 联系电话</label>
                        <input type="tel" id="modalPhone" name="phone" required placeholder="请输入联系电话">
                    </div>
                </div>
                <div class="form-group">
                    <label for="modalAddress">服务地址</label>
                    <input type="text" id="modalAddress" name="address" placeholder="请输入详细地址">
                </div>
                <div class="form-group">
                    <label for="modalAppointmentTime">预约时间</label>
                    <input type="datetime-local" id="modalAppointmentTime" name="appointmentTime">
                </div>
                <div class="form-group">
                    <label for="modalNotes">备注说明</label>
                    <textarea id="modalNotes" name="notes" rows="2" placeholder="请输入其他需求或说明"></textarea>
                </div>
                <button type="button" class="btn btn-primary" style="width: 100%;" onclick="proceedToPayment()">
                    去支付
                </button>
            </form>
        </div>
    </div>
</div>
